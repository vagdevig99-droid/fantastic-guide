<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aria · your intelligent banking agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Aurora backdrop -->
  <div class="aurora" aria-hidden="true">
    <div class="aurora-blob a"></div>
    <div class="aurora-blob b"></div>
    <div class="aurora-blob c"></div>
    <div class="aurora-grid"></div>
  </div>

  <main class="stage">

    <!-- Phone frame -->
    <div class="phone" role="application" aria-label="Aria">

      <span class="phone-button btn-volume-up"></span>
      <span class="phone-button btn-volume-down"></span>
      <span class="phone-button btn-power"></span>

      <div class="dynamic-island">
        <span class="di-sensor"></span>
        <span class="di-camera"></span>
      </div>
      <div class="status-bar">
        <span class="time">9:41</span>
        <span class="live-dot" id="liveDot" hidden title="Live LLM mode active"></span>
        <span class="status-icons">
          <svg width="16" height="11" viewBox="0 0 16 11" fill="currentColor"><path d="M0 8h2v3H0zM4 6h2v5H4zM8 4h2v7H8zM12 1h2v10h-2z"/></svg>
          <span class="dot-sep"></span>
          <svg width="14" height="11" viewBox="0 0 14 11" fill="currentColor"><path d="M7 0a8.3 8.3 0 0 1 5.5 2L11 3.5A6.5 6.5 0 0 0 7 2a6.5 6.5 0 0 0-4 1.5L1.5 2A8.3 8.3 0 0 1 7 0zm0 3a5 5 0 0 1 3.5 1.5L9 6A2.9 2.9 0 0 0 7 5a2.9 2.9 0 0 0-2 1L3.5 4.5A5 5 0 0 1 7 3zm0 3a2 2 0 0 1 1.4.6L7 8 5.6 6.6A2 2 0 0 1 7 6z"/></svg>
          <span class="battery"><span class="battery-cap"></span></span>
        </span>
      </div>

      <!-- Sticky header -->
      <header class="header glass">
        <div class="header-row">
          <div class="persona-chip" id="personaChip">
            <div class="avatar-sm" id="personaAvatar">PS</div>
            <div>
              <div class="persona-name" id="personaName">Priya Sharma</div>
              <div class="persona-tag" id="personaTag">Owner · Sunrise Bakery, Pune</div>
            </div>
          </div>
          <div class="header-right">
            <div class="view-toggle" id="viewToggle" role="tablist" aria-label="View mode">
              <button type="button" class="view-btn active" data-view="agent" role="tab">Aria</button>
              <button type="button" class="view-btn" data-view="classic" role="tab">Classic</button>
            </div>
            <label class="persona-switcher" aria-label="Switch profile">
              <select id="personaSelect">
                <option value="priya">SME</option>
                <option value="arjun">Retail</option>
              </select>
              <svg width="10" height="6" viewBox="0 0 10 6" fill="none" aria-hidden="true"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </label>
          </div>
        </div>

        <!-- Hero only visible on Aria screens -->
        <div class="hero" id="hero">
          <div class="orb" aria-hidden="true">
            <div class="orb-core"></div>
            <div class="orb-ring r1"></div>
            <div class="orb-ring r2"></div>
            <div class="orb-ring r3"></div>
          </div>
          <div class="hero-text">
            <div class="hero-name">Aria</div>
            <div class="hero-state" id="ariaState">Listening</div>
          </div>
        </div>
      </header>

      <!-- ════════ Screen: Intro (Revolut-Air-style splash) ════════ -->
      <section class="screen screen-intro" id="screenIntro">
        <div class="intro-stage">
          <div class="orb intro-orb" aria-hidden="true">
            <div class="orb-core"></div>
            <div class="orb-ring r1"></div>
            <div class="orb-ring r2"></div>
            <div class="orb-ring r3"></div>
          </div>
          <div class="intro-title">Aria</div>
          <div class="intro-sub">your intelligent banking agent</div>
        </div>
      </section>

      <!-- ════════ Screen: Hero (entry — Aria asks what you need) ════════ -->
      <section class="screen screen-hero" id="screenHero" hidden>
        <div class="hero-stage">
          <div class="orb hero-orb" aria-hidden="true">
            <div class="orb-core"></div>
            <div class="orb-ring r1"></div>
            <div class="orb-ring r2"></div>
            <div class="orb-ring r3"></div>
          </div>
          <div class="hero-greeting" id="heroGreeting"></div>
          <div class="hero-chips" id="heroChips"></div>
          <form class="hero-quickbox" id="heroQuickbox" autocomplete="off">
            <input type="text" id="heroInput" placeholder="Ask Aria anything…" />
            <button type="submit" aria-label="Send">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </form>
          <button type="button" class="hero-skip" id="heroSkip">
            Skip to my dashboard
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
      </section>

      <!-- ════════ Screen: Personalised page (today / money / plan / offers) ════════ -->
      <section class="screen screen-page" id="screenPage" hidden>
        <div class="page-scroll">
          <div class="page-header">
            <div class="page-title" id="pageTitle"></div>
            <div class="page-subtitle" id="pageSubtitle"></div>
          </div>
          <div class="page-blocks" id="pageBlocks"></div>
          <div class="page-pad"></div>
        </div>
      </section>

      <!-- ════════ Screen: Chat (multi-stage dialog) ════════ -->
      <section class="screen screen-chat" id="screenChat" hidden>
        <div class="chat" id="chat" aria-live="polite" aria-label="Conversation with Aria"></div>

        <div class="chips-wrap" id="chipsWrap" hidden>
          <div class="chips" id="chips"></div>
        </div>

        <form class="composer glass" id="composer" autocomplete="off">
          <button type="button" class="mic-btn" id="micBtn" aria-label="Voice input">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          </button>
          <input
            type="text"
            id="composerInput"
            placeholder="Ask Aria anything…"
            aria-label="Message Aria"
          />
          <button type="submit" id="composerSend" aria-label="Send">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </form>
      </section>

      <!-- ════════ Screen: Classic (widgets fallback) ════════ -->
      <section class="screen screen-classic" id="screenClassic" hidden>
        <div class="classic-scroll">
          <div class="classic-greet" id="classicGreet"></div>
          <div class="account-cards" id="accountCards"></div>
          <div class="quick-actions" id="quickActions"></div>
          <div class="section-head">Recent activity</div>
          <div class="tx-list" id="txList"></div>
          <div class="classic-pad"></div>
        </div>

        <div class="classic-nav" id="classicNav"></div>

        <button type="button" class="aria-fab" id="ariaFab" aria-label="Open Aria">
          <span class="orb-mini" aria-hidden="true">
            <span class="orb-mini-core"></span>
          </span>
          <span>Ask Aria</span>
        </button>
      </section>

      <!-- ════════ Screen: Feature (a single quick-action destination) ════════ -->
      <section class="screen screen-feature" id="screenFeature" hidden>
        <div class="feature-topbar">
          <button type="button" class="feature-back" id="featureBack" aria-label="Back">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <div class="feature-titles">
            <div class="feature-title" id="featureTitle"></div>
            <div class="feature-subtitle" id="featureSubtitle"></div>
          </div>
        </div>
        <div class="feature-scroll" id="featureScroll"></div>
        <div class="feature-action-wrap" id="featureActionWrap" hidden>
          <button type="button" class="feature-action" id="featureAction">
            <span class="feature-action-label" id="featureActionLabel"></span>
            <span class="feature-action-sub" id="featureActionSub"></span>
          </button>
        </div>
        <button type="button" class="aria-fab feature-fab" id="featureFab" aria-label="Ask Aria">
          <span class="orb-mini" aria-hidden="true"><span class="orb-mini-core"></span></span>
          <span>Ask Aria</span>
        </button>
      </section>

      <!-- ════════ Voice overlay (shown when mic is tapped) ════════ -->
      <div class="voice-overlay" id="voiceOverlay" hidden>
        <div class="voice-card">
          <div class="voice-state" id="voiceState">Listening</div>
          <div class="voice-waveform" id="voiceWaveform">
            <span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span>
          </div>
          <div class="voice-transcription" id="voiceTranscription" hidden></div>
          <button type="button" class="voice-cancel" id="voiceCancel" aria-label="Cancel voice input">Cancel</button>
        </div>
      </div>

      <!-- ════════ Bottom tab bar (shown on page + chat screens) ════════ -->
      <nav class="tabbar" id="tabbar" hidden aria-label="Sections">
        <button type="button" class="tab-item" data-tab="today">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>
          <span>Today</span>
        </button>
        <button type="button" class="tab-item" data-tab="money">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="13" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="15"/></svg>
          <span>Money</span>
        </button>
        <button type="button" class="tab-item tab-aria" data-tab="chat" aria-label="Talk to Aria">
          <span class="orb-mini" aria-hidden="true"><span class="orb-mini-core"></span></span>
          <span>Aria</span>
        </button>
        <button type="button" class="tab-item" data-tab="plan">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 17 9 11 13 15 21 7"/><polyline points="14 7 21 7 21 14"/></svg>
          <span>Plan</span>
        </button>
        <button type="button" class="tab-item" data-tab="offers">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12V8H6a2 2 0 0 1 0-4h12.5a.5.5 0 0 1 0 1H6"/><path d="M3 5v14a2 2 0 0 0 2 2h15v-4"/><path d="M18 12a2 2 0 0 0 0 4h4v-4z"/></svg>
          <span>Offers</span>
        </button>
      </nav>

    </div>

  </main>

  <script src="scenarios.js"></script>
  <script src="app.js"></script>
</body>
</html>
